name: Build and Deploy Site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Compile academic.tex
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: Academic_CV
          root_file: academic.tex

      - name: Assemble site
        run: |
          mkdir -p _site/assets
          cp index.html research.html _site/
          cp assets/EUI-Logo.svg assets/photo.jpg _site/assets/
          cp Academic_CV/academic.pdf _site/assets/cv.pdf
          echo "--- _site contents ---"
          ls -la _site _site/assets

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
